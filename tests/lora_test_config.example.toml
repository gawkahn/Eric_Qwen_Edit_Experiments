# tests/lora_test_config.toml — copy this file to lora_test_config.toml
# (which is gitignored) and edit the paths to match your host.
#
# The test harness loads ./lora_test_config.toml from the same directory
# as the script.  Without it, --check / --generate require absolute paths.

[paths]
# Bare LoRA filenames or relative paths in --inspect/--check/--generate
# get resolved against this root.
loras_root  = "/home/gawkahn/projects/ai-lab/ai-base/models/comfyui/models/loras"

# Bare model names or relative paths in --base-model get resolved against
# this root.  Each subdirectory is expected to be a diffusers model dir
# (with model_index.json).
models_root = "/home/gawkahn/projects/ai-lab/ai-base/models/hf-local"

# Where --generate writes the output PNG.  Created on demand.
output_dir  = "tests/output"

# Substring substitutions applied to every CLI path arg before resolution.
# Useful when you copy a path from a ComfyUI workflow JSON or a LoRA's
# embedded metadata — those reference container-internal paths that need
# to be remapped to the host filesystem to run outside ComfyUI.
#
# Each key is a substring to find; each value is what to replace it with.
# Substitutions are applied in order; first match wins per path.
[paths.container_to_host]
"/comfy/mnt/models/" = "/home/gawkahn/projects/ai-lab/ai-base/models/comfyui/models/"
"/basedir/models/"   = "/home/gawkahn/projects/ai-lab/ai-base/models/comfyui/models/"

# Defaults for --generate.  All overridable on the command line.
[generate]
prompt          = "a small red sphere on a white background, studio lighting"
negative_prompt = ""
steps           = 4
guidance_scale  = 1.0   # for guidance-distilled models (Flux/Flux2)
true_cfg_scale  = 1.0   # for true-CFG models (Qwen-Image)
height          = 512
width           = 512
seed            = 42
weight          = 1.0   # LoRA weight for the single test adapter
